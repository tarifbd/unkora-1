version: '3.9'

# Development override — only infrastructure services, apps run via `npm run dev`
services:
  postgres:
    image: postgres:16-alpine
    container_name: unkora_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: unkora
      POSTGRES_PASSWORD: unkora_pass
      POSTGRES_DB: unkora_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unkora']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unkora_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - '6379:6379'

  typesense:
    image: typesense/typesense:27.1
    container_name: unkora_typesense_dev
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: dev-typesense-key
    volumes:
      - typesense_dev_data:/data
    ports:
      - '8108:8108'

volumes:
  postgres_dev_data:
  redis_dev_data:
  typesense_dev_data:
