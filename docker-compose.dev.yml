version: '3.9'

# Local dev infrastructure — only Postgres needed.
# The API uses in-memory cache locally; Redis is production-only.
# Usage: docker-compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: unkora_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: unkora
      POSTGRES_PASSWORD: unkora_secret_dev
      POSTGRES_DB: unkora
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unkora -d unkora']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_dev_data:
