version: '3.9'

# Local dev infrastructure — apps run via npm run dev on host
# Usage: docker-compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: unkora_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: unkora
      POSTGRES_PASSWORD: unkora_secret_dev
      POSTGRES_DB: unkora
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unkora -d unkora']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: unkora_redis_dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
