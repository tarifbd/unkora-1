name: CI

on:
  push:
    branches: [main, develop, 'claude/**', 'feature/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unkora
          POSTGRES_PASSWORD: unkora_pass
          POSTGRES_DB: unkora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test

      - name: Run DB migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test

      - name: Run tests
        run: npm run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-do-not-use-in-production
          JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-production

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'

      - name: Build all apps
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: https://unkora.com

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unkora
          POSTGRES_PASSWORD: unkora_pass
          POSTGRES_DB: unkora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test

      - name: Run DB migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test

      - name: Build API
        run: npm run build --workspace=apps/api
        env:
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test

      - name: Start API server
        run: node apps/api/dist/main.js &
        env:
          NODE_ENV: test
          PORT: 4000
          DATABASE_URL: postgresql://unkora:unkora_pass@localhost:5432/unkora_test
          JWT_SECRET: ci-e2e-jwt-secret
          JWT_REFRESH_SECRET: ci-e2e-refresh-secret
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

      - name: Wait for API
        run: npx wait-on http://localhost:4000/api/v1/health --timeout 30000

      - name: Build Next.js
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Start Next.js
        run: npm run start --workspace=apps/web &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          PORT: 3000

      - name: Wait for Next.js
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web
        env:
          BASE_URL: http://localhost:3000
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
