version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: unkora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unkora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-unkora_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-unkora} -d ${POSTGRES_DB:-unkora_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unkora_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    container_name: unkora_typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-dev-typesense-key}
    volumes:
      - typesense_data:/data
    ports:
      - '8108:8108'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8108/health']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/docker/Dockerfile
    container_name: unkora_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-unkora}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-unkora_db}
      REDIS_URL: redis://redis:6379
    env_file: .env
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/docker/Dockerfile
    container_name: unkora_web
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  typesense_data: